<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat image generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bitcount+Grid+Double+Ink:wght@100..900&display=swap" rel="stylesheet">
</head>
<body>
    <h1>CAT IMAGE GENERATOR</h1>
    <main>
        <div id="imgDiv">
            <picture>
                <img src="imgs/temp.jpg" alt="" id="img" loading="lazy" >
            </picture>
        </div>
            <button class="btn" onclick="Random()">Generate random</button>
            <button class="btn" onclick="loadCatWithTag()">Generate with tag (below)</button>
        </div>
        <div>
            <select id="tagSelect">
                <option value="">Select a tag...</option>
            </select>
        </div>
        <textarea name="" id="textArea" placeholder="Write anything on the image (only works with generate random)" cols="50" rows="5"></textarea>
    </main>
    <script src="script.js"></script>
</body>
</html>
